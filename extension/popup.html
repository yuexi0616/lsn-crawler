<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
    }
    .header {
      background: #2563eb;
      color: #fff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-title {
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 13px;
      color: #475569;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

    .btn-secondary {
      background: #e2e8f0;
      color: #475569;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #cbd5e1; }

    .btn-danger {
      background: #ef4444;
      color: #fff;
      margin-top: 8px;
    }
    .btn-danger:hover { background: #dc2626; }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row label {
      width: 70px;
      flex-shrink: 0;
      line-height: 32px;
      font-size: 12px;
      color: #64748b;
    }
    .row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      width: 60px;
    }
    .row input:focus { border-color: #2563eb; }

    .status {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
      min-height: 18px;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }

    .progress {
      margin-top: 8px;
      background: #e2e8f0;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #2563eb;
      width: 0%;
      transition: width 0.3s;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">LMS 实验报告爬取</div>

  <!-- 当前页面 -->
  <div class="section">
    <div class="section-title">当前页面</div>
    <div id="pageInfo" class="status">检测中...</div>
    <button id="btnSaveCurrent" class="btn btn-primary">保存当前页面为 Markdown</button>
  </div>

  <!-- 批量爬取 -->
  <div class="section">
    <div class="section-title">批量爬取</div>
    <div class="row">
      <label>Assignments</label>
      <input id="batchStartAssign" type="number" placeholder="起始" />
      <span style="line-height:32px">~</span>
      <input id="batchEndAssign" type="number" placeholder="结束" />
    </div>
    <div class="row">
      <label>Module ID</label>
      <input id="batchStartModule" type="number" placeholder="起始" />
      <span style="line-height:32px">~</span>
      <input id="batchEndModule" type="number" placeholder="结束" />
    </div>
    <button id="btnStartBatch" class="btn btn-primary">开始批量爬取</button>
    <button id="btnStopBatch" class="btn btn-danger" style="display:none">停止批量爬取</button>
    <div class="progress" id="progressBar"><div class="progress-bar" id="progressFill"></div></div>
    <div id="batchStatus" class="status"></div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
